name: ci

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

permissions:
  contents: write

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - run: git init .
      - run: git remote add origin "https://github.com/${{ github.repository }}.git"
      - run: git fetch --depth=1 origin "${{ github.sha }}"
      - run: git checkout --force FETCH_HEAD
      - run: chmod +x build.sh test.sh
      - run: ./build.sh
      - run: ./test.sh

  build-windows:
    runs-on: windows-latest
    steps:
      - shell: cmd
        run: git init .
      - shell: cmd
        run: git remote add origin https://github.com/%GITHUB_REPOSITORY%.git
      - shell: cmd
        run: git fetch --depth=1 origin %GITHUB_SHA%
      - shell: cmd
        run: git checkout --force FETCH_HEAD
      - shell: cmd
        run: build.bat
      - shell: cmd
        run: test.bat
      - shell: cmd
        run: if not exist dist mkdir dist
      - shell: cmd
        run: tar.exe -a -c -f dist\ceretree-windows-x64.zip -C bin ceretree.exe
      - shell: cmd
        run: tar.exe -czf dist\ceretree-linux-x64.tar.gz -C bin ceretree
      - shell: cmd
        run: git tag -f edge
      - shell: cmd
        run: git push origin refs\tags\edge --force
      - shell: cmd
        run: gh release view edge >nul 2>nul && gh release upload edge dist\ceretree-windows-x64.zip dist\ceretree-linux-x64.tar.gz --clobber || gh release create edge dist\ceretree-windows-x64.zip dist\ceretree-linux-x64.tar.gz --title edge --notes "Automated rolling prerelease from ci." --prerelease --latest=false
