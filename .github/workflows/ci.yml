name: ci

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - run: git init .
      - run: git remote add origin "https://github.com/${{ github.repository }}.git"
      - run: git fetch --depth=1 origin "${{ github.sha }}"
      - run: git checkout --force FETCH_HEAD
      - run: chmod +x build.sh test.sh
      - run: ./build.sh
      - run: ./test.sh

  build-windows:
    runs-on: windows-latest
    steps:
      - shell: cmd
        run: git init .
      - shell: cmd
        run: git remote add origin https://github.com/%GITHUB_REPOSITORY%.git
      - shell: cmd
        run: git fetch --depth=1 origin %GITHUB_SHA%
      - shell: cmd
        run: git checkout --force FETCH_HEAD
      - shell: cmd
        run: build.bat
      - shell: cmd
        run: test.bat
