name: ci

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

permissions:
  contents: write

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - run: git init .
      - run: git remote add origin "https://github.com/${{ github.repository }}.git"
      - run: git fetch --depth=1 origin "${{ github.sha }}"
      - run: git checkout --force FETCH_HEAD
      - run: chmod +x build.sh
      - run: ./build.sh all
      - run: mkdir -p dist
      - run: cp bin/ceretree dist/ceretree-linux-x64
      - run: cp bin/ceretree.exe dist/ceretree-windows-x64.exe
      - run: gh release upload edge dist/ceretree-linux-x64 dist/ceretree-windows-x64.exe --clobber
